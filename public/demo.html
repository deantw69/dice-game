<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>骰盅動畫 Demo</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    /* 搖骰控制列釘頂:不論捲到哪裡都點得到「一起搖!」 */
    .demo-wrap .controls {
      position: sticky;
      top: 0;
      z-index: 20;
      margin-top: 0;
      padding: 12px;
      border-radius: var(--r-md);
      background: rgba(15, 18, 38, 0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    }
  </style>
</head>
<body>
  <div class="demo-wrap">
    <div class="demo-head">
      <h1>🎲 骰子動畫 Demo</h1>
      <p class="muted">每種樣式都有編號,按「一起搖!」同時演示同一組點數。告訴我你喜歡第幾號 👍</p>
    </div>

    <div class="controls">
      <label class="field">骰子數量
        <input id="count" type="number" min="1" max="100" value="3" />
      </label>
      <button id="roll">🎲 一起搖!</button>
      <label class="field"><input id="mute" type="checkbox" /> 靜音</label>
    </div>

    <div class="demo-grid" id="grid" style="margin-top:18px;"></div>

    <p class="muted" style="text-align:center;margin-top:20px;">
      <a href="/">← 回首頁</a>
    </p>
  </div>

  <script type="module">
    import { createRenderer as createCup } from '/js/dice/diceCup.js';
    import { createRenderer as createD20 } from '/js/dice/diceD20.js';

    // 各樣式(依序編號 #1、#2 …)。faces 不填預設 6。
    const VARIANTS = [
      { title: '骰盅 ・ 紫盅 / 上掀',  tag: '喀啦音效 ・ 往上掀蓋',   make: (el, n) => createCup(el, { count: n, style: 'purple', lift: 'up',    sound: true }) },
      { title: '骰盅 ・ 木紋 / 上掀',  tag: '木紋盅 ・ 往上掀蓋',     make: (el, n) => createCup(el, { count: n, style: 'wood',   lift: 'up',    sound: true }) },
      { title: '骰盅 ・ 金屬 / 右滑',  tag: '金屬高光 ・ 往右滑開',   make: (el, n) => createCup(el, { count: n, style: 'metal',  lift: 'right', sound: true }) },
      { title: '骰盅 ・ 翡翠 / 傾倒',  tag: '翡翠綠 ・ 往側邊傾倒',   make: (el, n) => createCup(el, { count: n, style: 'jade',   lift: 'tilt',  sound: true }) },
      { title: '骰盅 ・ 黑曜 / 左滑',  tag: '黑曜亮面 ・ 往左滑開',   make: (el, n) => createCup(el, { count: n, style: 'dark',   lift: 'left',  sound: true }) },
      { title: '骰盅 ・ 木紋 / 傾倒',  tag: '木紋盅 ・ 往側邊傾倒',   make: (el, n) => createCup(el, { count: n, style: 'wood',   lift: 'tilt',  sound: true }) },
      { title: '20 面骰 ・ 紫',  tag: 'd20 ・ 3D 翻滾 + 碰撞散落 (1~20)', faces: 20, make: (el, n) => createD20(el, { style: 'violet',  count: n, scatter: true }) },
      { title: '20 面骰 ・ 翡翠', tag: 'd20 ・ 3D 翻滾 + 碰撞散落 (1~20)', faces: 20, make: (el, n) => createD20(el, { style: 'emerald', count: n, scatter: true }) },
      { title: '20 面骰 ・ 緋紅', tag: 'd20 ・ 3D 翻滾 + 碰撞散落 (1~20)', faces: 20, make: (el, n) => createD20(el, { style: 'crimson', count: n, scatter: true }) },
    ];

    const grid = document.getElementById('grid');
    const countInput = document.getElementById('count');
    const rollBtn = document.getElementById('roll');
    const muteBox = document.getElementById('mute');

    // 建立卡片
    VARIANTS.forEach((v, i) => {
      const card = document.createElement('div');
      card.className = 'demo-card';
      card.innerHTML = `
        <h2><span class="num">#${i + 1}</span> ${v.title}</h2>
        <div class="tag">${v.tag}</div>
        <div class="stage" id="stage-${i}"></div>
        <p class="muted result" id="result-${i}" style="text-align:center;margin:10px 0 0;">—</p>`;
      grid.appendChild(card);
    });

    let renderers = [];
    function build() {
      const n = Math.max(1, Math.min(100, parseInt(countInput.value) || 1));
      renderers = VARIANTS.map((v, i) => {
        const stage = document.getElementById('stage-' + i);
        stage.innerHTML = '';
        return v.make(stage, n);
      });
    }

    const randValues = (n, faces = 6) => Array.from({ length: n }, () => 1 + Math.floor(Math.random() * faces));

    let rolling = false;
    async function roll() {
      if (rolling) return;
      rolling = true;
      rollBtn.disabled = true;
      const n = Math.max(1, Math.min(100, parseInt(countInput.value) || 1));
      VARIANTS.forEach((_, i) => (document.getElementById('result-' + i).textContent = '搖骰中…'));
      // 靜音則暫時關掉音效:用全域旗標
      window.__cupMuted = muteBox.checked;
      // 每個樣式依自己的面數產生點數(d20 → 1~20)
      const perValues = VARIANTS.map((v) => randValues(n, v.faces || 6));
      await Promise.all(renderers.map((r, i) => r.rollTo(perValues[i])));
      VARIANTS.forEach((_, i) => {
        const vals = perValues[i];
        document.getElementById('result-' + i).textContent =
          `結果: ${vals.join(' , ')}　(總和 ${vals.reduce((a, b) => a + b, 0)})`;
      });
      rollBtn.disabled = false;
      rolling = false;
    }

    countInput.addEventListener('change', build);
    rollBtn.addEventListener('click', roll);
    build();
  </script>
</body>
</html>
