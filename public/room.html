<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>骰盅遊戲 — 房間</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="room-wrap">
    <div class="room-sticky">
      <header class="room-top">
        <div class="room-code">
          房號 <strong id="rcode">····</strong>
          <button id="copy" class="mini">複製</button>
        </div>
        <div id="modeBadge" class="badge"></div>
        <button id="menuToggle" class="mini secondary menu-toggle" type="button" title="選單" aria-label="選單">☰</button>
        <div class="top-actions">
          <label id="autoNextWrap" class="auto-next" style="display:none"><input type="checkbox" id="autoNext"/> 自動下一場</label>
          <label class="auto-roll" title="搖骰環節自動骰,不用按"><input type="checkbox" id="autoRoll"/> 自動骰</label>
          <label id="shakeRollWrap" class="auto-roll" style="display:none" title="搖晃手機即可擲骰(等同按住搖、停下定)"><input type="checkbox" id="shakeRoll"/> 📱 搖手機擲骰</label>
          <button id="shuffle" class="mini secondary" type="button" title="打亂玩家順序" style="display:none">🔀 打亂順序</button>
          <button id="shareQr" class="mini secondary" type="button" title="分享房間 QR Code">📷 分享</button>
          <button id="muteToggle" class="mini secondary" type="button" title="音效開關">🔊</button>
          <button id="forceReset" class="mini danger" style="display:none">🔄 強制重來</button>
          <button id="benchSelf" class="secondary mini" style="display:none" title="暫時離開,不參與下一輪;按「我回來了」才回歸">💤 我要暫離</button>
          <button id="leave" class="secondary mini">離開</button>
        </div>
      </header>

      <p id="toast" role="alert"></p>
      <section id="banner" class="banner"></section>
      <section id="controls" class="panel"></section>
      <section id="pokerGuide" class="panel poker-guide" style="display:none"></section>
      <section id="lobby" class="panel"></section>
    </div>

    <div class="room-body">
      <main id="board"></main>
    </div>

    <!-- 懸浮玩家列表(右下角,可收起,不隨棋盤捲動) -->
    <aside id="roster" class="panel roster-float">
      <button id="rosterCollapse" class="mini roster-collapse" type="button" title="收起玩家列表">收起 ›</button>
      <div id="rosterBody"></div>
    </aside>
    <button id="rosterOpen" class="roster-open" type="button" title="顯示玩家列表" style="display:none">👥 玩家</button>
  </div>

  <!-- 分享房間 QR Code overlay(點背景或關閉鈕關閉) -->
  <div id="qrOverlay" class="qr-overlay" style="display:none">
    <div class="qr-box">
      <button id="qrClose" class="mini secondary qr-close" type="button" title="關閉">✕</button>
      <h3 class="qr-title">掃描加入房間</h3>
      <canvas id="qrCanvas" class="qr-canvas" width="264" height="264"></canvas>
      <p class="qr-code-line">房號 <strong id="qrCode">····</strong></p>
      <p class="qr-hint">用另一台手機相機掃描,開啟後輸入暱稱即可加入</p>
      <p class="qr-url muted" id="qrUrl"></p>
    </div>
  </div>

  <!-- 本局輸家 popup(置中浮現,下一場開始自動消失;pointer-events:none 不擋按鈕) -->
  <div id="loserPopup" class="loser-popup" style="display:none"></div>
  <!-- 炸彈爆炸特效(俄羅斯輪盤爆掉時播一次,純視覺) -->
  <div id="bombFx" class="bomb-fx" style="display:none"></div>
  <!-- 最終勝利者 popup(淘汰制結束時彈出) -->
  <div id="winnerPopup" class="winner-popup" style="display:none"></div>

  <!-- 話胚牌型大小 popup(點 ℹ️ 按鈕展開,點外面關閉) -->
  <div id="pokerRankPopup" class="rank-popup" style="display:none"></div>

  <!-- 各模式規則說明:左下角 info 小 icon(僅特定模式顯示),點了彈出 popup -->
  <button id="modeInfoBtn" class="mode-info-btn" type="button" title="本模式規則說明" style="display:none">ℹ️</button>
  <div id="modeInfoPopup" class="rank-popup" style="display:none"></div>

  <!-- 吹牛開盅各點數統計 popup(下一場開始自動消失;點外面關閉) -->
  <div id="statsPopup" class="stats-popup" style="display:none"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/room.js"></script>
</body>
</html>
